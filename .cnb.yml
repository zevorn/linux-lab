# Push pipeline: build and push Docker image on every push
main:
  push:
    - services:
        - docker
      stages:
        - name: build-and-push-image
          image: docker:latest
          script:
            - docker build -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest .
            - docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest

# Cloud IDE: build image from Dockerfile, use cached result on subsequent opens
$:
  vscode:
    - docker:
        build: Dockerfile
      services:
        - vscode
        - docker
      stages:
        - name: verify
          script:
            - qemu-system-arm --version
            - arm-linux-gnueabihf-gcc --version
            - dialog --version
