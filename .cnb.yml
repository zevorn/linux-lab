# CNB Cloud IDE configuration
# - On push: build Docker image and push to CNB registry
# - Cloud IDE: use the latest pre-built image (no rebuild on open)
$:
  vscode:
    - docker:
        build: Dockerfile
      services:
        - vscode
        - docker
      stages:
        - name: verify
          script:
            - qemu-system-arm --version
            - arm-linux-gnueabihf-gcc --version
            - dialog --version
