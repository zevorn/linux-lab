# Push pipeline: build and push Docker image on every push
main:
  push:
    - docker:
        build: Dockerfile
        image: registry.cnb.cool/gevico.online/linux-lab:latest
      stages:
        - name: verify
          image: registry.cnb.cool/gevico.online/linux-lab:latest
          script:
            - qemu-system-arm --version
            - qemu-system-riscv64 --version
            - qemu-system-x86_64 --version

# Cloud IDE: build image from Dockerfile, use cached result on subsequent opens
$:
  vscode:
    - docker:
        build: Dockerfile
      services:
        - vscode
        - docker
      stages:
        - name: verify
          script:
            - qemu-system-arm --version
            - arm-linux-gnueabihf-gcc --version
            - dialog --version
